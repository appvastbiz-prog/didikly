<!DOCTYPE html>
<html>
<head>
  <title>Available Tutors – Didikly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: system-ui, sans-serif; background:#0f172a; color:#e5e7eb; margin:0; }
    .container { max-width:900px; margin:0 auto; padding:24px; }
    .topbar { display:flex; justify-content:space-between; margin-bottom:16px; }
    .card { background:#020617; padding:20px; border-radius:12px; margin-bottom:16px; cursor:pointer; }
    .card:hover { outline:1px solid #38bdf8; }
    .slot { padding:10px; margin-top:8px; background:#020617; border-radius:8px; cursor:pointer; border:1px solid #1e293b; }
    .slot:hover { outline:1px solid #38bdf8; }
    a { color:#38bdf8; text-decoration:none; }
    .muted { color:#94a3b8; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="/dashboard.html">← Dashboard</a>
      <a href="/dashboard.html">Home</a>
    </div>

    <h2>Available Tutors</h2>
    <p class="muted">Click a tutor to view their available slots</p>

    <p id="loading" class="muted">Loading...</p>
    <div id="tutorList"></div>
  </div>

  <script type="module">
    import { supabase } from "./supabase.js";
    import { requireAuth } from "./guard.js";

    async function init() {
      const access = await requireAuth(["student"]);
      if (!access.ok) {
        document.getElementById("loading").innerText = "Access denied";
        return;
      }
      document.getElementById("loading").style.display = "none";
      loadTutors();
    }

    async function loadTutors() {
      const { data: tutors, error } = await supabase
        .from("profiles")
        .select("id, institution, gender, first_language, avg_rating, price")
        .eq("role", "tutor");

      const list = document.getElementById("tutorList");
      list.innerHTML = "";

      if (error) {
        list.innerHTML = `<p class="muted">${error.message}</p>`;
        return;
      }

      if (!tutors || tutors.length === 0) {
        list.innerHTML = "<p class='muted'>No tutors found.</p>";
        return;
      }

      tutors.forEach(tutor => {
        const card = document.createElement("div");
        card.className = "card";

        const slotsDiv = document.createElement("div");
        slotsDiv.id = `slots-${tutor.id}`;
        slotsDiv.className = "hidden muted";
        slotsDiv.innerText = "Loading slots...";

        card.innerHTML = `
          <strong>Tutor-${tutor.id.slice(-4)}</strong><br>
          <span class="muted">
            Institution: ${tutor.institution || "N/A"}<br>
            Gender: ${tutor.gender || "N/A"}<br>
            First Language: ${tutor.first_language || "N/A"}<br>
            Rating: ${tutor.avg_rating ?? "N/A"}<br>
            Price: RM ${tutor.price ?? "N/A"} / hour
          </span>
        `;

        card.appendChild(slotsDiv);

        let loaded = false;
        card.onclick = async () => {
          slotsDiv.classList.toggle("hidden");
          if (!loaded) {
            await loadSlots(tutor.id, slotsDiv);
            loaded = true;
          }
        };

        list.appendChild(card);
      });
    }

    async function loadSlots(tutorId, container) {
      const { data: slots, error } = await supabase
        .from("availability_slots")
        .select("*")
        .eq("tutor_id", tutorId)
        .is("booked_session_id", null)
        .gt("start_time", new Date().toISOString())
        .or("locked_until.is.null,locked_until.lt.now()")
        .order("start_time", { ascending: true });

      if (error) {
        container.innerText = error.message;
        return;
      }

      if (!slots || slots.length === 0) {
        container.innerHTML = "<p class='muted'>No available slots.</p>";
        return;
      }

      container.innerHTML = "<strong>Available Slots:</strong>";

      slots.forEach(slot => {
        const div = document.createElement("div");
        div.className = "slot";
        div.innerText = `${new Date(slot.start_time).toLocaleString()} → ${new Date(slot.end_time).toLocaleString()}`;
        div.onclick = (e) => {
          e.stopPropagation(); // prevent toggling card
          window.location.href = `/request.html?tutor=${tutorId}&slot=${slot.id}`;
        };
        container.appendChild(div);
      });
    }

    init();
  </script>
</body>
</html>
