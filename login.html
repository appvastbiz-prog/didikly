<!DOCTYPE html>
<html>
<head>
  <title>Login - Didikly</title>
</head>
<body>

<h2>Authentication</h2>

<button onclick="showLogin()">Login</button>
<button onclick="showRegister()">Register</button>

<hr>

<!-- LOGIN SECTION -->
<div id="loginSection">
  <h3>Login</h3>
  <form id="loginForm">
    <label>Email:</label><br>
    <input type="email" id="loginEmail" required><br><br>

    <label>Password:</label><br>
    <input type="password" id="loginPassword" required><br><br>

    <button type="submit">Login</button>
  </form>
</div>

<!-- REGISTER SECTION -->
<div id="registerSection" style="display:none;">
  <h3>Register</h3>
  <form id="registerForm">

    <label>University Email:</label><br>
    <input type="email" id="regEmail" required><br><br>

    <label>Password:</label><br>
    <input type="password" id="regPassword" required><br><br>

    <label>Name:</label><br>
    <input type="text" id="regName" required><br><br>

    <label>Institution:</label><br>
    <input type="text" id="regInstitution" required><br><br>

    <label>Gender:</label><br>
    <input type="text" id="regGender" required><br><br>

    <label>Age:</label><br>
    <input type="number" id="regAge" required><br><br>

    <label>First Language:</label><br>
    <input type="text" id="regFirstLanguage" required><br><br>

    <button type="submit">Register</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = "YOUR_PROJECT_URL";
  const supabaseKey = "YOUR_ANON_PUBLIC_KEY";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
</script>

</body>
</html>
